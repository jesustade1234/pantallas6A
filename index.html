
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Gestión de Laboratorios</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#020617;
overflow:hidden;
}

/* BURBUJAS */

.bubbles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

.bubbles span{
position:absolute;
bottom:-100px;
width:20px;
height:20px;
background:rgba(56,189,248,0.3);
border-radius:50%;
animation:rise 10s linear infinite;
}

.bubbles span:nth-child(1){left:10%; animation-duration:8s;}
.bubbles span:nth-child(2){left:20%; animation-duration:12s;}
.bubbles span:nth-child(3){left:30%; animation-duration:10s;}
.bubbles span:nth-child(4){left:40%; animation-duration:14s; width:25px;height:25px;}
.bubbles span:nth-child(5){left:50%; animation-duration:9s;}
.bubbles span:nth-child(6){left:60%; animation-duration:11s;}
.bubbles span:nth-child(7){left:70%; animation-duration:13s;}
.bubbles span:nth-child(8){left:80%; animation-duration:7s;}
.bubbles span:nth-child(9){left:90%; animation-duration:10s;}
.bubbles span:nth-child(10){left:25%; animation-duration:15s;}

@keyframes rise{
0%{
transform:translateY(0) scale(1);
opacity:0.5;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

/* CAJA LOGIN */

.login{
background:#0f172a;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
color:white;

border:2px solid #38bdf8;

box-shadow:
0 0 10px #38bdf8,
0 0 20px #38bdf8,
0 0 40px #38bdf8;
}

/* NOMBRE DEL SISTEMA */

.titulo-sistema{
color:#38bdf8;
font-size:20px;
margin-bottom:10px;
font-weight:bold;
}

/* IMAGEN */

.logo{
width:100px;
margin-bottom:10px;
}

/* TITULO LOGIN */

h2{
margin-bottom:15px;
}

/* INPUTS */

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #334155;
background:#020617;
color:white;
}

input:focus{
outline:none;
border:1px solid #38bdf8;
}

/* BOTON */

button{
width:100%;
padding:10px;
background:#38bdf8;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
margin-top:10px;
transition:0.3s;
}

button:hover{
box-shadow:0 0 10px #38bdf8,0 0 20px #38bdf8;
transform:scale(1.05);
}

</style>
</head>

<body>

<!-- BURBUJAS -->
<div class="bubbles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
</div>

<div class="login">

<div class="titulo-sistema">Gestión de Laboratorios</div>

<img src="foto1.png" class="logo">

<h2>Iniciar Sesión</h2>

<input type="text" placeholder="Usuario">
<input type="password" placeholder="Contraseña">

<a href="principal.html">
<button>Entrar</button>
</a>

</div>

</body>
</html>
