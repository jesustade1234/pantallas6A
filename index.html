
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e293b,#0f172a);
font-family:Arial;
}

/* CAJA LOGIN */

.login{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

/* IMAGEN */

.logo{
width:100px;
margin-bottom:15px;
}

/* INPUTS */

input{
width:100%;
padding:10px;
margin:10px 0;
}

/* BOTON */

button{
width:100%;
padding:10px;
background:#38bdf8;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0284c7;
}

</style>
</head>

<body>

<div class="login">

<img src="foto1.png" class="logo">

<h2>Iniciar Sesión</h2>

<input type="text" placeholder="Usuario">
<input type="password" placeholder="Contraseña">

<a href="principal.html">
<button>Entrar</button>
</a>

</div>

</body>
</html>
