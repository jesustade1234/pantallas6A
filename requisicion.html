

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Requisición</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#020617;
color:white;
min-height:100vh;
padding:40px;
overflow:auto;
}

/* BURBUJAS */

.bubbles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

.bubbles span{
position:absolute;
bottom:-100px;
width:20px;
height:20px;
background:rgba(0,255,157,0.3);
border-radius:50%;
animation:rise 10s linear infinite;
}

.bubbles span:nth-child(1){left:10%; animation-duration:8s;}
.bubbles span:nth-child(2){left:20%; animation-duration:12s; width:15px; height:15px;}
.bubbles span:nth-child(3){left:30%; animation-duration:10s;}
.bubbles span:nth-child(4){left:40%; animation-duration:14s; width:25px; height:25px;}
.bubbles span:nth-child(5){left:50%; animation-duration:9s;}
.bubbles span:nth-child(6){left:60%; animation-duration:11s;}
.bubbles span:nth-child(7){left:70%; animation-duration:13s;}
.bubbles span:nth-child(8){left:80%; animation-duration:7s;}
.bubbles span:nth-child(9){left:90%; animation-duration:10s;}
.bubbles span:nth-child(10){left:25%; animation-duration:15s;}

@keyframes rise{
0%{
transform:translateY(0) scale(1);
opacity:0.5;
}
100%{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}

/* CONTENEDOR */

.container{
max-width:900px;
margin:auto;
position:relative;
z-index:1;
}

/* TITULOS */

h1{
text-align:center;
margin-bottom:10px;
color:#38bdf8;
}

h2{
margin:25px 0 15px 0;
}

/* FORMULARIO */

form{
background:#0f172a;
padding:25px;
border-radius:12px;
margin-bottom:30px;
border:2px solid #00ff9d;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
background:#020617;
color:white;
border:1px solid #334155;
}

input:focus{
outline:none;
border:1px solid #38bdf8;
}

/* BOTON */

button{
background:#0ea5e9;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:6px;
margin-top:10px;
transition:0.3s;
}

button:hover{
box-shadow:0 0 10px #0ea5e9,0 0 20px #0ea5e9;
transform:scale(1.05);
}

/* TABLA */

table{
width:100%;
border-collapse:collapse;
background:#0f172a;
border-radius:10px;
overflow:hidden;
}

th,td{
border:1px solid #334155;
padding:10px;
text-align:center;
}

th{
background:#0ea5e9;
color:white;
}

tr:hover{
background:#1e293b;
}

</style>
</head>

<body>

<!-- BURBUJAS -->
<div class="bubbles">
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

<span></span>
<span></span>
</div>

<div class="container">

<h1>Sistema de Gestión de Equipos de Cómputo</h1>

<h2>Requisición de Compra / Mantenimiento</h2>

<form>

<input type="text" placeholder="Área solicitante">
<input type="text" placeholder="Solicitado por">

<label>Fecha emisión</label>
<input type="date">

<label>Fecha requerimiento</label>
<input type="date">

<input type="number" placeholder="Cantidad">
<input type="text" placeholder="Unidad">

<input type="text" placeholder="Marca">
<input type="text" placeholder="Modelo">
<input type="text" placeholder="Serie">
<input type="text" placeholder="Descripción">

<button>Guardar</button>

</form>

</html>
